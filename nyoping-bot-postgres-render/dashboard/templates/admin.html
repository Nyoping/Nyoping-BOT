<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>관리자</title>
  <style>
    body{font-family:system-ui,Segoe UI,Apple SD Gothic Neo,sans-serif;max-width:860px;margin:40px auto;padding:0 16px}
    .card{border:1px solid #ddd;border-radius:14px;padding:18px;margin:14px 0}
    a.btn, button.btn{display:inline-block;padding:10px 14px;border-radius:10px;background:#111;color:#fff;text-decoration:none;border:0;cursor:pointer}
    input{padding:10px 12px;border-radius:10px;border:1px solid #ddd;width:100%;max-width:360px}
  </style>
</head>
<body>
  <h1>🛠️ 운영자 비상 모드</h1>
  <div class="card">
    <form method="post" action="/admin-goto">
      <p>관리할 서버 Guild ID를 입력하거나, 아래 목록에서 선택해줘.</p>
      <input name="guild_id" type="number" placeholder="Guild ID" required />
      <div style="height:10px"></div>
      <button class="btn" type="submit">이동</button>
    </form>
  </div>

  <div class="card">
    <p><b>DB에 저장된 Guild 목록</b></p>
    {% if guild_ids and guild_ids|length > 0 %}
      <ul>
        {% for gid in guild_ids %}
          <li><a href="/guild/{{ gid }}">{{ gid }}</a></li>
        {% endfor %}
      </ul>
    {% else %}
      <p>아직 기록된 Guild가 없습니다.</p>
    {% endif %}
  </div>

  <a class="btn" href="/admin-logout">로그아웃</a>
</body>
</html>
