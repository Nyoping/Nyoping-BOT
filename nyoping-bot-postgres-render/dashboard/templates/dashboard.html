<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>뇨핑봇 대시보드</title>
  <style>
    body{font-family:system-ui,Segoe UI,Apple SD Gothic Neo,sans-serif;max-width:900px;margin:40px auto;padding:0 16px}
    .top{display:flex;justify-content:space-between;align-items:center}
    .card{border:1px solid #ddd;border-radius:14px;padding:18px;margin:14px 0}
    a.btn{display:inline-block;padding:10px 14px;border-radius:10px;background:#111;color:#fff;text-decoration:none}
    a.link{color:#06c;text-decoration:none}
    ul{padding-left:18px}
    code{background:#f4f4f4;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="top">
    <h1>🐧 뇨핑봇 대시보드</h1>
    <div>
      <span>{{ user.username }}#{{ user.discriminator }}</span>
      <a class="btn" href="/logout">로그아웃</a>
    </div>
  </div>

  <div class="card">
    <h3>관리 가능한 서버</h3>
    {% if guilds|length == 0 %}
      <p>서버 관리 권한이 있는 서버가 없어요.</p>
    {% else %}
      <ul>
        {% for g in guilds %}
          <li>
            <strong>{{ g.name }}</strong> (<code>{{ g.id }}</code>)
            - <a class="link" href="/guild/{{ g.id }}">설정</a>
            - <a class="link" href="/guild/{{ g.id }}/leaderboard">랭킹</a>
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
</body>
</html>
