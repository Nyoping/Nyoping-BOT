<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>랭킹</title>
  <style>
    body{font-family:system-ui,Segoe UI,Apple SD Gothic Neo,sans-serif;max-width:900px;margin:40px auto;padding:0 16px}
    table{border-collapse:collapse;width:100%}
    th,td{border-bottom:1px solid #eee;padding:10px;text-align:left}
    a.link{color:#06c;text-decoration:none}
    code{background:#f4f4f4;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <a class="link" href="/guild/{{ guild_id }}">← 설정</a>
  <h1>랭킹 (TOP 50)</h1>

  <table>
    <thead><tr><th>#</th><th>User ID</th><th>XP</th><th>Level</th></tr></thead>
    <tbody>
      {% for r in rows %}
        <tr>
          <td>{{ loop.index }}</td>
          <td><code>{{ r.user_id }}</code></td>
          <td>{{ r.xp }}</td>
          <td>{{ (r.xp // 100) }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
