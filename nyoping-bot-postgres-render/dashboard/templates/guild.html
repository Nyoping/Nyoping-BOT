<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>서버 설정</title>
  <style>
    body{font-family:system-ui,Segoe UI,Apple SD Gothic Neo,sans-serif;max-width:900px;margin:40px auto;padding:0 16px}
    .card{border:1px solid #ddd;border-radius:14px;padding:18px;margin:14px 0}
    label{display:block;margin:10px 0 4px}
    input[type=number]{width:180px;padding:8px}
    button{padding:10px 14px;border-radius:10px;border:0;background:#111;color:#fff;cursor:pointer}
    a.link{color:#06c;text-decoration:none}
    code{background:#f4f4f4;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <a class="link" href="/">← 서버 목록</a>
  <h1>서버 설정</h1>

  <div class="card">
    <p>Guild ID: <code>{{ guild_id }}</code></p>
    <form method="post" action="/guild/{{ guild_id }}/settings">
      <label>출석 XP</label>
      <input type="number" name="checkin_xp" value="{{ s.checkin_xp }}" min="0" max="10000"/>

      <label>출석 제한(하루 1회)</label>
      <input type="checkbox" name="checkin_limit_enabled" {% if s.checkin_limit_enabled %}checked{% endif %}/>

      <label>채팅 XP</label>
      <input type="number" name="message_xp" value="{{ s.message_xp }}" min="0" max="1000"/>

      <label>채팅 쿨다운(초)</label>
      <input type="number" name="message_cooldown_sec" value="{{ s.message_cooldown_sec }}" min="0" max="3600"/>

      <label>음성 XP(분당)</label>
      <input type="number" name="voice_xp_per_min" value="{{ s.voice_xp_per_min }}" min="0" max="1000"/>

      <div style="margin-top:14px">
        <button type="submit">저장</button>
      </div>
    </form>
  </div>
</body>
</html>
