<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>뇨핑봇 대시보드</title>
  <style>
    body{font-family:system-ui,Segoe UI,Apple SD Gothic Neo,sans-serif;max-width:860px;margin:40px auto;padding:0 16px}
    .card{border:1px solid #ddd;border-radius:14px;padding:18px;margin:14px 0}
    a.btn, button.btn{display:inline-block;padding:10px 14px;border-radius:10px;background:#111;color:#fff;text-decoration:none;border:0;cursor:pointer}
    input{padding:10px 12px;border-radius:10px;border:1px solid #ddd;width:100%;max-width:360px}
    .muted{color:#666;font-size:14px}
    .warn{color:#b45309;font-weight:600}
  </style>
</head>
<body>
  <h1>🐧 뇨핑봇 대시보드</h1>

  {% if blocked_for and blocked_for > 0 %}
  <div class="card">
    <div class="warn">Discord API 제한으로 로그인 요청이 잠시 차단됐어요.</div>
    <div class="muted">약 {{ blocked_for }}초 후 다시 시도해줘.</div>
  </div>
  {% endif %}

  <div class="card">
    <p>Discord로 로그인해서 서버 설정을 관리하세요.</p>
    <a class="btn" href="/login">Discord로 로그인</a>
  </div>

  {% if admin_enabled %}
  <div class="card">
    <p><b>운영자 비상 로그인</b> (Discord 로그인 문제가 있을 때만)</p>
    <form method="post" action="/admin-login">
      <input name="password" type="password" placeholder="관리자 비밀번호" required />
      <div style="height:10px"></div>
      <button class="btn" type="submit">비상 로그인</button>
    </form>
    <div class="muted" style="margin-top:8px">Render 환경변수 <code>DASHBOARD_ADMIN_PASSWORD</code>가 설정되어 있어야 보여요.</div>
  </div>
  {% endif %}
</body>
</html>
