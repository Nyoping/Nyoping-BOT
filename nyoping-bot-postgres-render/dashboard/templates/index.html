<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>뇨핑봇 대시보드</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;margin:0;background:#0b1220;color:#e5e7eb}
    .wrap{max-width:960px;margin:0 auto;padding:28px}
    .card{background:#111a2e;border:1px solid #1f2a44;border-radius:14px;padding:18px}
    input,button{font-size:16px}
    input{width:100%;padding:10px;border-radius:10px;border:1px solid #2b3a60;background:#0b1220;color:#e5e7eb}
    button{padding:10px 14px;border-radius:10px;border:0;background:#2563eb;color:white;cursor:pointer}
    .row{display:flex;gap:12px;align-items:center}
    .mt{margin-top:14px}
    .small{font-size:13px;color:#9ca3af}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>❄️ 뇨핑봇 대시보드</h1>
    <div class="card">
      <p class="small">관리자 비밀번호로 로그인하면 서버 설정/빠른 작업을 사용할 수 있어요.</p>
      <form method="post" action="/admin-login" class="mt">
        <div class="row">
          <input type="password" name="password" placeholder="관리자 비밀번호" required>
          <button type="submit">로그인</button>
        </div>
      </form>
      <div class="mt small">
        로그인 후 <b>/admin</b> 페이지에서 서버 ID를 넣어 관리할 수 있어요.
      </div>

    <div class="mt small" style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <span>개발자: <b>{{ developer_name }}</b></span>
      <span>
        <a href="/legal/privacy" style="color:#93c5fd;text-decoration:none">개인정보처리방침</a>
        ·
        <a href="/legal/terms" style="color:#93c5fd;text-decoration:none">이용약관</a>
      </span>
    </div>
    </div>
  </div>
</body>
</html>
