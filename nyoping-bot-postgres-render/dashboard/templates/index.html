<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>뇨핑봇 대시보드</title>
  <style>
    body{font-family:system-ui;margin:40px;max-width:760px}
    .card{border:1px solid #ddd;border-radius:12px;padding:16px;margin:12px 0}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #333;background:#111;color:#fff;cursor:pointer}
    input{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;box-sizing:border-box}
    .muted{color:#666;font-size:14px}
    code{background:#f3f3f3;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <h1>뇨핑봇 대시보드</h1>
  <div class="card">
    <h3>운영자 로그인</h3>
    {% if not admin_enabled %}
      <p class="muted">Render 환경변수 <code>DASHBOARD_ADMIN_PASSWORD</code>를 설정하면 활성화됩니다.</p>
    {% else %}
      {% if admin_error %}<p style="color:#b00">{{ admin_error }}</p>{% endif %}
      <form method="post" action="/admin-login">
        <input type="password" name="password" placeholder="관리자 비밀번호" autocomplete="current-password" />
        <div style="height:10px"></div>
        <button class="btn" type="submit">로그인</button>
      </form>
    {% endif %}
    {% if disable_discord_oauth %}
      <p class="muted">Discord 로그인은 현재 비활성화 상태입니다(<code>DISABLE_DISCORD_OAUTH=1</code>).</p>
    {% endif %}
  </div>
</body>
</html>
